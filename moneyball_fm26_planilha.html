<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moneyball FM26 — Baseado na Planilha</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10; --bg2: #12151c; --bg3: #1a1e28; --bg4: #232836;
  --border: #2a3040; --border2: #3a4060;
  --text: #e0e4ec; --text2: #8890a4; --text3: #5a6278;
  --accent: #00e893; --accent2: #00c47a; --accent-dim: rgba(0,232,147,0.1); --accent-ring: rgba(0,232,147,0.28);
  --warn: #ff6b4a; --gold: #ffd700; --blue: #4a9eff;
  --font: 'JetBrains Mono', monospace; --font2: 'Space Grotesk', sans-serif;
}
body[data-theme="light"] {
  --bg: #f2f5fa; --bg2: #ffffff; --bg3: #e8ecf4; --bg4: #dde3ef;
  --border: #c8d0e0; --border2: #b0bccc;
  --text: #1a1e2e; --text2: #4a5470; --text3: #7a849c;
  --accent: #00b36b; --accent2: #009458;
  --accent-dim: rgba(0,179,107,0.1); --accent-ring: rgba(0,179,107,0.25);
  --warn: #e8472a; --gold: #c8940a; --blue: #2a7edf;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; min-height:100vh; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

.header { background:var(--bg2); border-bottom:1px solid var(--accent-ring); padding:16px 24px; display:flex; align-items:center; gap:20px; }
.logo { font-family:var(--font2); font-size:21px; font-weight:700; color:var(--accent); letter-spacing:0.5px; }
.logo span { color:var(--text2); font-weight:300; letter-spacing:0; }
.version { font-size:10px; color:var(--text3); background:var(--bg3); border:1px solid var(--border); padding:2px 8px; border-radius:4px; }

.tabs { display:flex; gap:2px; background:var(--bg2); padding:0 24px; border-bottom:1px solid var(--border); overflow-x:auto; }
.tab { padding:10px 16px; cursor:pointer; color:var(--text2); font-size:12px; font-weight:500; border-bottom:3px solid transparent; transition:all .15s; white-space:nowrap; font-family:var(--font); }
.tab:hover { color:var(--text); background:var(--bg3); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(0,232,147,0.07); }
.tab .emoji { margin-right:4px; }

.main { padding:20px 24px; max-width:100%; }

.input-section { margin-bottom:20px; }
.input-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.input-header h3 { font-family:var(--font2); font-size:15px; font-weight:600; color:var(--text); }
.help-text { font-size:11px; color:var(--text3); line-height:1.5; margin-bottom:8px; }
.help-text code { background:var(--bg3); padding:1px 5px; border-radius:2px; color:var(--accent); }

textarea { width:100%; height:120px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:11px; padding:10px; border-radius:4px; resize:vertical; }
textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
textarea::placeholder { color:var(--text3); }

.drop-zone { border:1px solid var(--border2); border-radius:8px; padding:18px; text-align:center; cursor:pointer; transition:all .2s; margin-bottom:8px; background:var(--bg3); }
.drop-zone:hover, .drop-zone.drag-over { border-color:var(--accent); border-style:dashed; background:rgba(0,232,147,0.05); }
.drop-zone .drop-text { font-size:11px; color:var(--text2); }
.drop-zone .drop-text b { color:var(--text); }

.detect-info { display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:6px 10px; background:var(--bg3); border:1px solid var(--border); border-radius:4px; margin-top:6px; font-size:11px; }
.detect-info .det-label { color:var(--text3); }
.detect-info .det-value { color:var(--accent); font-weight:600; }
.detect-info .det-warn { color:var(--warn); }

.btn-row { display:flex; gap:8px; margin-top:8px; }
.btn { padding:8px 18px; border:none; border-radius:4px; cursor:pointer; font-family:var(--font); font-size:12px; font-weight:600; transition:all .15s; }
.btn-primary { background:var(--accent); color:var(--bg); box-shadow:0 2px 10px rgba(0,232,147,0.25); }
.btn-primary:hover { background:var(--accent2); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,232,147,0.35); }
.btn-secondary { background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--text2); color:var(--text); }
.btn-danger { background:rgba(255,107,74,0.15); color:var(--warn); border:1px solid rgba(255,107,74,0.3); }
.btn-danger:hover { background:rgba(255,107,74,0.25); }

.stats-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:6px; padding:12px 16px; min-width:140px; flex:1; }
.stat-card .label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; }
.stat-card .value { font-size:24px; font-weight:700; color:var(--accent); font-family:var(--font2); line-height:1; }
.stat-card .sub { font-size:10px; color:var(--text2); margin-top:4px; }

.table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:8px; background:var(--bg2); }
table { width:100%; border-collapse:collapse; font-size:11px; }
thead th { background:var(--bg3); padding:9px 10px; text-align:left; font-weight:600; color:var(--text3); border-bottom:2px solid var(--border); cursor:pointer; white-space:nowrap; position:sticky; top:0; z-index:1; user-select:none; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
thead th:hover { color:var(--accent); background:var(--bg4); }
thead th.sorted-asc::after { content:' ▲'; color:var(--accent); font-size:9px; }
thead th.sorted-desc::after { content:' ▼'; color:var(--accent); font-size:9px; }
tbody tr { border-bottom:1px solid rgba(42,48,64,0.6); transition:background .1s; }
tbody tr:hover { background:rgba(0,232,147,0.05); }
tbody td { padding:6px 10px; white-space:nowrap; }
td.name { font-weight:600; color:var(--text); }
td.rank { color:var(--text3); font-weight:700; text-align:center; width:30px; }
td.num { text-align:right; font-variant-numeric:tabular-nums; }
td.score-cell { font-weight:700; }

.score-badge { display:inline-block; padding:3px 10px; border-radius:4px; font-weight:700; font-size:11px; letter-spacing:0.3px; }
.score-s { background:rgba(0,232,147,0.12); color:#00e893; box-shadow:0 0 0 1px rgba(0,232,147,0.35); }
.score-a { background:rgba(74,158,255,0.12); color:#4a9eff; box-shadow:0 0 0 1px rgba(74,158,255,0.35); }
.score-b { background:rgba(255,215,0,0.12); color:#ffd700; box-shadow:0 0 0 1px rgba(255,215,0,0.35); }
.score-c { background:rgba(255,107,74,0.12); color:#ff6b4a; box-shadow:0 0 0 1px rgba(255,107,74,0.35); }
body[data-theme="light"] .score-s { background:rgba(0,179,107,0.18); color:#007a49; box-shadow:0 0 0 1px rgba(0,179,107,0.45); }
body[data-theme="light"] .score-a { background:rgba(42,126,223,0.14); color:#1a5db0; box-shadow:0 0 0 1px rgba(42,126,223,0.40); }
body[data-theme="light"] .score-b { background:rgba(200,148,10,0.15); color:#8a6200; box-shadow:0 0 0 1px rgba(200,148,10,0.40); }
body[data-theme="light"] .score-c { background:rgba(232,71,42,0.13); color:#c0300f; box-shadow:0 0 0 1px rgba(232,71,42,0.38); }

.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state h3 { font-family:var(--font2); font-size:16px; color:var(--text2); margin-bottom:8px; }

.cols-info { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; }
.col-tag { font-size:10px; background:var(--bg3); border:1px solid var(--border); padding:2px 6px; border-radius:2px; color:var(--text2); }

.toast { position:fixed; bottom:20px; right:20px; background:var(--accent); color:var(--bg); padding:10px 20px; border-radius:6px; font-weight:600; font-size:12px; z-index:999; animation:slideIn .3s ease; }
@keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.legend { display:flex; gap:12px; margin:12px 0; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text2); }
.legend-dot { width:10px; height:10px; border-radius:2px; }
.search-bar { display:flex; gap:8px; margin-bottom:10px; align-items:center; flex-wrap:wrap; }
.search-bar input { flex:1; min-width:180px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:12px; padding:7px 12px; border-radius:4px; }
.search-bar input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
.search-bar input::placeholder { color:var(--text3); }
.result-count { font-size:11px; color:var(--text3); margin-bottom:6px; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; display:flex; align-items:center; justify-content:center; animation:fadeIn .2s ease; }
.modal-box { background:var(--bg2); border:1px solid var(--border2); border-radius:10px; padding:24px; max-width:740px; width:92%; max-height:84vh; overflow-y:auto; animation:slideUp .2s ease; }
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; gap:12px; }
.modal-name { font-family:var(--font2); font-size:18px; font-weight:700; color:var(--text); }
.modal-sub { font-size:11px; color:var(--text2); margin-top:4px; }
.modal-score { font-size:15px !important; padding:5px 14px !important; }
.modal-close { background:var(--bg3); border:1px solid var(--border); color:var(--text2); width:30px; height:30px; border-radius:4px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.modal-close:hover { border-color:var(--warn); color:var(--warn); }
.modal-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:8px; }
.modal-stat { background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:8px 10px; }
.modal-stat.top { border-color:rgba(0,232,147,0.45); background:rgba(0,232,147,0.07); box-shadow:inset 0 0 0 0.5px rgba(0,232,147,0.2); }
.modal-stat-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:5px; }
.modal-stat-value { font-size:16px; font-weight:700; color:var(--accent); font-family:var(--font2); line-height:1; }
tbody tr.data-row { cursor:pointer; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(28px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ─── HEATMAP VIA DATA ATTRIBUTE ─── */
td[data-heat="good"] { background: rgba(0,232,147,0.17); }
td[data-heat="bad"]  { background: rgba(255,107,74,0.15); }
body[data-theme="light"] td[data-heat="good"] { background: rgba(0,179,107,0.18); }
body[data-theme="light"] td[data-heat="bad"]  { background: rgba(232,71,42,0.12); }

/* ─── OVERRIDES TEMA CLARO ─── */
body[data-theme="light"] ::-webkit-scrollbar-track { background: var(--bg3); }
body[data-theme="light"] ::-webkit-scrollbar-thumb { background: var(--border2); }
body[data-theme="light"] .tab.active { background: rgba(0,179,107,0.08); }
body[data-theme="light"] .drop-zone:hover, body[data-theme="light"] .drop-zone.drag-over { background: rgba(0,179,107,0.06); }
body[data-theme="light"] tbody tr:hover { background: rgba(0,179,107,0.07); }
body[data-theme="light"] .modal-overlay { background: rgba(30,35,60,0.55); }
body[data-theme="light"] .modal-stat.top { border-color:rgba(0,179,107,0.45); background:rgba(0,179,107,0.08); }
body[data-theme="light"] .btn-primary { box-shadow: 0 2px 10px rgba(0,179,107,0.22); }
body[data-theme="light"] .btn-primary:hover { box-shadow: 0 4px 16px rgba(0,179,107,0.32); }

/* ─── BOTÃO TOGGLE TEMA ─── */
.theme-toggle {
  margin-left: auto; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); width: 34px; height: 34px; border-radius: 6px;
  cursor: pointer; font-size: 16px; display: flex; align-items: center;
  justify-content: center; transition: border-color .15s, background .15s; flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ─── BADGE DE CONTAGEM NAS ABAS ─── */
.tab-count {
  font-size: 9px; color: var(--text3); background: var(--bg3); border: 1px solid var(--border);
  padding: 0px 4px; border-radius: 3px; margin-left: 4px; font-weight: 600; vertical-align: middle;
}
.tab.active .tab-count { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-ring); }

/* ─── SEÇÃO DE ENTRADA COLAPSÁVEL ─── */
.input-toggle-bar {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; font-size: 11px; color: var(--text2); font-family: var(--font);
  font-weight: 500; margin-bottom: 12px; user-select: none;
  transition: border-color .15s, color .15s;
}
.input-toggle-bar:hover { border-color: var(--accent); color: var(--text); }
.toggle-arrow { font-size: 9px; transition: transform .2s; display: inline-block; }
.toggle-arrow.open { transform: rotate(180deg); }
.toggle-badge {
  margin-left: auto; background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-ring); font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600;
}
.input-body.collapsed { display: none; }

/* ─── BOTÃO SCROLL TO TOP ─── */
.scroll-top-btn {
  position: fixed; bottom: 24px; left: 20px; width: 38px; height: 38px;
  border-radius: 8px; background: var(--accent); color: var(--bg);
  border: none; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  opacity: 0; transform: translateY(10px); transition: opacity .2s, transform .2s; pointer-events: none;
}
.scroll-top-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.scroll-top-btn:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">MONEYBALL<span>FM26</span></div>
  <div class="version">v2.0 — Baseado na Planilha FM26</div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeToggleBtn" title="Alternar tema claro/escuro" aria-label="Alternar tema">🌙</button>
</div>

<div class="tabs" id="tabs"></div>
<div class="main" id="main"></div>

<script>
// ─── POSITION CONFIGURATIONS ───
const POSITIONS = {
  goleiros: {
    emoji: '🧤', name: 'Goleiros',
    rawCols: ['Jogador','Nação','Clube','Idade','Valor Estimado','Pé Preferido','Salário','Altura','Expira','HdJ','Minutos','Golos Sofridos','Ds','Dft','Dfa','Press. tent.','Poss Con/90','Poss Perd/90','Sem golos sofridos','Amr','Cartões vermelhos','Faltas Cometidas','Faltas Contra','PeP','Passes Ch','Pas A','Ps C','xGD','Press. conc.','EPG','T Desa','Des C','Crt D','Pen. Enfrentados','Pen. Defendidos','Classificação'],
    derive(r) {
      const min = pf(r['Minutos']); const j90 = min/90;
      const gs = pf(r['Golos Sofridos']); const ds = pf(r['Ds']); const dft = pf(r['Dft']); const dfa = pf(r['Dfa']);
      const cs = pf(r['Sem golos sofridos']); const xgd = pf(r['xGD']); const epg = pf(r['EPG']);
      const penEnf = pf(r['Pen. Enfrentados']); const penDef = pf(r['Pen. Defendidos']);
      const defTotal = ds+dft+dfa; const bolasEnf = dft+dfa+ds+gs;
      const pasA = pf(r['Pas A']); const pasC = pf(r['Ps C']);
      return {
        Jogador: r['Jogador'], Nação: r['Nação']||'', Clube: r['Clube']||'', Idade: pf(r['Idade']),
        Salário: r['Salário']||'', Valor: r['Valor Estimado']||'', 'Nota FM': pf(r['Classificação']),
        'Jogos/90': rnd(j90), 'Gols Sofridos': gs,
        'Def Seguras/90': sDiv(ds,j90), 'Def Ponta/90': sDiv(dft,j90), 'Def Desviadas/90': sDiv(dfa,j90),
        'Def Total/90': sDiv(defTotal,j90), '% Defesas': pct(defTotal,bolasEnf),
        'xG Defendido/90': sDiv(xgd,j90), 'xG Prev (sem pen)': rnd(xgd-(penDef*0.79)),
        'xGP Ratio': pct(xgd,xgd+gs), 'Clean Sheet %': pct(cs,j90),
        'Min/Gol Sofrido': sDiv(min,gs), 'Idx Def Críticas': sDiv(dft*2+dfa*1.5+ds*1,bolasEnf),
        '% Passes': pct(pasC,pasA), 'Falhas/90': sDiv(epg,j90),
        '% Pen Defendidos': pct(penDef,penEnf),
        _moneyball: (() => {
          const fm  = clamp((pf(r['Classificação'])-5)/3*100,0,100);
          const defS= clamp(pct(defTotal,bolasEnf)/75*100,0,100);
          const xgpS= clamp(pct(xgd,xgd+gs)/50*100,0,100);
          const csS = clamp(pct(cs,j90)/40*100,0,100);
          const pssS= clamp((pct(pasC,pasA)-60)/30*100,0,100);
          const errS= clamp(100-sDiv(epg,j90)*40,0,100);
          const m   = defS*.30+xgpS*.25+csS*.20+pssS*.15+errS*.10;
          return clamp(rnd(fm*.35+m*.65),0,100);
        })()
      };
    },
    displayCols: ['Jogador','Clube','Idade','Jogos/90','Def Total/90','% Defesas','xG Defendido/90','Clean Sheet %','Min/Gol Sofrido','Idx Def Críticas','% Passes','Falhas/90','Nota FM'],
  },
  zagueiros: {
    emoji: '🧱', name: 'Zagueiros',
    rawCols: ['Jogador','Nação','Clube','Idade','Valor Estimado','Pé Preferido','Salário','Altura','Expira','Minutos','Presenças','HdJ','EPG','Golos','Assist.','Amr','Cartões vermelhos','Press. tent.','Press. conc.','Cabs','Cab A','Cab Dec/90','T Desa','Des C','Blq','Rems Bloq','Poss Con/90','Crt D','Crt','Faltas Cometidas','Alívios','Distância','Sprints/90','Fnt','PeP','Pas A','Ps C','OCG','Remates','Rem %','Pens','Pens M','xG','xA','Passes Ch','Remates em livres','Classificação'],
    derive(r) {
      const min = pf(r['Minutos']); const j90 = min/90;
      const cabs = pf(r['Cabs']); const cabA = pf(r['Cab A']); const desT = pf(r['T Desa'])+pf(r['Faltas Cometidas']);
      const desC = pf(r['Des C']); const blq = pf(r['Blq']); const remBlq = pf(r['Rems Bloq']);
      const intcp = pf(r['Crt']); const crtD = pf(r['Crt D']); const aliv = pf(r['Alívios']);
      const presT = pf(r['Press. tent.']); const presC = pf(r['Press. conc.']);
      const pasA = pf(r['Pas A']); const pasC = pf(r['Ps C']); const epg = pf(r['EPG']);
      const xg = pf(r['xG']); const xa = pf(r['xA']); const pens = pf(r['Pens']);
      const gols = pf(r['Golos']); const ast = pf(r['Assist.']);
      return {
        Jogador: r['Jogador'], Nação: r['Nação']||'', Clube: r['Clube']||'', Idade: pf(r['Idade']),
        Salário: r['Salário']||'', Valor: r['Valor Estimado']||'', 'Nota FM': pf(r['Classificação']),
        'Jogos/90': rnd(j90), 'Gols+Ast': gols+ast,
        'Cab Ganhos/90': sDiv(cabA,j90), '% Cabs': pct(cabA,cabs),
        'Des Ganhos/90': sDiv(desC,j90), 'Int+Bloq/90': sDiv(intcp+blq+remBlq,j90),
        'Alívios/90': sDiv(aliv,j90), 'Pressão/90': sDiv(presT,j90), '% Pressão': pct(presC,presT),
        '% Passes': pct(pasC,pasA), 'xG+xA/90': sDiv(xg+xa,j90),
        'Erros→Gol/90': sDiv(epg,j90),
        _moneyball: (() => {
          const fm  = clamp((pf(r['Classificação'])-5)/3*100,0,100);
          const aerS= clamp(sDiv(cabA,j90)/5*100,0,100);
          const apS = clamp(pct(cabA,cabs)/65*100,0,100);
          const defS= clamp(sDiv(desC,j90)/4*100,0,100);
          const intS= clamp(sDiv(intcp+blq+remBlq,j90)/10*100,0,100);
          const pssS= clamp((pct(pasC,pasA)-70)/25*100,0,100);
          const errS= clamp(100-sDiv(epg,j90)*50,0,100);
          const prS = clamp(pct(presC,presT)/35*100,0,100);
          const m   = aerS*.15+apS*.10+defS*.20+intS*.20+pssS*.15+errS*.10+prS*.10;
          return clamp(rnd(fm*.35+m*.65),0,100);

    rawCols: ['Jogador','Nação','Clube','Idade','Valor Estimado','Salário','Expira','Minutos','Presenças','HdJ','Golos','Assist.','OCG','Poss Con/90','Poss Perd/90','xG','xA','Faltas Cometidas','Faltas Contra','Pas A','Ps C','Passes Ch','PeP','Fnt','Remates','Rem %','Cab A','Cabs','Press. tent.','Press. conc.','T Desa','Des C','Crt','Crt D','Blq','Rems Bloq','Alívios','Amr','Cartões vermelhos','EPG','Sprints/90','Pens','Pens M','Distância','Cr T','Cr C','Classificação'],
    derive(r) {
      const min = pf(r['Minutos']); const j90 = min/90;
      const xg = pf(r['xG']); const xa = pf(r['xA']); const pens = pf(r['Pens']); const pensM = pf(r['Pens M']);
      const gols = pf(r['Golos']); const ast = pf(r['Assist.']); const ocg = pf(r['OCG']);
      const rem = pf(r['Remates']); const remC = pf(r['Rem %']);
      const pasA = pf(r['Pas A']); const pasC = pf(r['Ps C']); const passD = pf(r['Passes Ch']);
      const cabA = pf(r['Cab A']); const cabs = pf(r['Cabs']);
      const presT = pf(r['Press. tent.']); const presC = pf(r['Press. conc.']);
      const desT = pf(r['T Desa'])+pf(r['Faltas Cometidas']); const desC = pf(r['Des C']);
      const intcp = pf(r['Crt']); const crtD = pf(r['Crt D']); const blq = pf(r['Blq']); const remBlq = pf(r['Rems Bloq']); const aliv = pf(r['Alívios']);
      const fnt = pf(r['Fnt']); const epg = pf(r['EPG']); const dist = pf(r['Distância']);
      const crT = pf(r['Cr T']); const crC = pf(r['Cr C']);
      const xgSP = xg-(pens*0.79); const sprint = pf(r['Sprints/90']);
      const amr = pf(r['Amr']); const verm = pf(r['Cartões vermelhos']);
      return {
        Jogador: r['Jogador'], Nação: r['Nação']||'', Clube: r['Clube']||'', Idade: pf(r['Idade']),
        Valor: r['Valor Estimado']||'', Salário: r['Salário']||'', 'Nota FM': pf(r['Classificação']),
        'Jogos/90': rnd(j90), 'Gols': gols, 'Ast': ast, 'G+A': gols+ast,
        'Gols/90': sDiv(gols,j90), 'Ast/90': sDiv(ast,j90), 'G+A/90': sDiv(gols+ast,j90),
        'npxG/90': sDiv(xgSP,j90), 'xA/90': sDiv(xa,j90), 'xG+xA/90': sDiv(xgSP+xa,j90),
        'Fin/90': sDiv(rem,j90), '% Fin': remC,
        '% Passes': pct(pasC,pasA), 'Pass D/90': sDiv(passD,j90),
        'Des G/90': sDiv(desC,j90), 'Int+Bloq/90': sDiv(intcp+blq+remBlq+crtD,j90),
        'Cab G/90': sDiv(cabs,j90), '% Cabs': pct(cabs,cabA),
        'Pressão/90': sDiv(presT,j90), '% Pressão': pct(presC,presT),
        'Cruz/90': sDiv(crT,j90), '% Cruz': pct(crC,crT),
        'Fintas/90': sDiv(fnt,j90), 'Sprints/90': sprint,
        'Dist/90': sDiv(dist,j90), 'Falhas/90': sDiv(epg,j90),
        'Cartões': amr+verm, 'Alívios/90': sDiv(aliv,j90),
        _moneyball: clamp(rnd(pf(r['Classificação']) * 10), 0, 100)
      };
    },
    displayCols: ['Jogador','Clube','Idade','Jogos/90','G+A','Gols/90','Ast/90','npxG/90','xA/90','% Passes','Des G/90','Pressão/90','Cab G/90','Fintas/90','Sprints/90','Falhas/90','Nota FM'],
  }
};

// ─── UTILS ───
function pf(v) {
  if(v===undefined||v===null||v==='') return 0;
  let s = String(v).trim();
  // Remove common units/suffixes from FM data
  s = s.replace(/\s*km\s*/gi,'').replace(/\s*cm\s*/gi,'')
       .replace(/\s*€.*$/,'').replace(/\s*p\/m.*$/,'')
       .replace(/\s*M\s*€.*$/i,'').replace(/\s*m\s*€.*$/,'')
       .replace(/[^\d.,\-]/g, function(m) { return ''; });
  s = s.trim();
  if(!s || s === '-') return 0;

  // PT-BR: "1.234,56" → 1234.56 | "6,4" → 6.4 | "1234" → 1234
  // EN: "1,234.56" → 1234.56 | "6.4" → 6.4
  const lastComma = s.lastIndexOf(',');
  const lastDot = s.lastIndexOf('.');

  if(lastComma > lastDot) {
    // Comma is last → PT-BR decimal: "1.234,56" or "6,4"
    s = s.replace(/\./g, '').replace(',', '.');
  } else if(lastDot > lastComma) {
    // Dot is last → EN decimal: "1,234.56" or "6.4"
    s = s.replace(/,/g, '');
  } else if(lastComma >= 0 && lastDot < 0) {
    // Only comma → treat as decimal: "6,4"
    s = s.replace(',', '.');
  }
  // Only dot or no separator → already fine

  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function rnd(v,d=2) { return Math.round(v * Math.pow(10,d)) / Math.pow(10,d); }
function sDiv(a,b) { return b===0 ? 0 : rnd(a/b); }
function pct(a,b) { return b===0 ? 0 : rnd((a/b)*100); }
function clamp(v,min,max) { return Math.max(min, Math.min(max, v)); }

function scoreClass(s) {
  if(s >= 70) return 'score-s';
  if(s >= 50) return 'score-a';
  if(s >= 30) return 'score-b';
  return 'score-c';
}
function scoreLabel(s) {
  if(s >= 70) return 'S';
  if(s >= 50) return 'A';
  if(s >= 30) return 'B';
  return 'C';
}

function processData() {
  const raw = document.getElementById('pasteArea').value.trim();
  if(!raw) return showToast('⚠️ Cole os dados primeiro!');

  const parsed = smartParse(raw);
  if(!parsed) return;

  const cfg = POSITIONS[currentTab];
  const missingCols = cfg.rawCols.filter(c => !parsed.headers.includes(c));
  if(missingCols.length > Math.floor(cfg.rawCols.length * 0.4)) {
    return showToast(`⚠️ Muitas colunas ausentes (${missingCols.length}/${cfg.rawCols.length}): ${missingCols.slice(0,4).join(', ')}...`);
  }

  const rows = [];
  for(let i = 0; i < parsed.data.length; i++) {
    const obj = parsed.data[i];
    const name = obj['Jogador'] || obj['Nome'] || obj['Player'] || obj['Name'] || '';
    if(!name) continue;
    try {
      const derived = cfg.derive(obj);
      if(derived['Jogos/90'] >= 1) rows.push(derived);
    } catch(e) { console.warn('Erro linha', i+2, e); }
  }

  if(rows.length === 0) {
    const hint = missingCols.length ? ` Faltam: ${missingCols.slice(0,4).join(', ')}` : '';
    return showToast(`⚠️ 0 jogadores válidos.${hint}`);
  }

  allData[currentTab] = rows;
  saveToStorage();
  const excl = parsed.data.length - rows.length;
  showToast(`✅ ${rows.length} ${cfg.name} processados!${excl>0?' ('+excl+' excluídos por pouco tempo)':''}`);
  renderMain();
}

// ─── SMART PARSER: auto-detect Tab / ; / , ───
function smartParse(raw) {
  const lines = raw.split(/\r?\n/).filter(l => l.trim());
  if(lines.length < 2) { showToast('⚠️ Precisa de cabeçalho + pelo menos 1 linha'); return null; }

  // Detect separator by counting occurrences in first line
  const firstLine = lines[0];
  const tabCount = (firstLine.match(/\t/g) || []).length;
  const semiCount = (firstLine.match(/;/g) || []).length;
  const commaCount = (firstLine.match(/,/g) || []).length;

  let sep, sep_name;
  if(tabCount >= 3 && tabCount >= semiCount && tabCount >= commaCount) {
    sep = '\t'; sep_name = 'Tab (Excel/Sheets)';
  } else if(semiCount >= 3 && semiCount >= commaCount) {
    sep = ';'; sep_name = 'Ponto-e-vírgula (CSV BR)';
  } else if(commaCount >= 3) {
    sep = ','; sep_name = 'Vírgula (CSV)';
  } else {
    sep = '\t'; sep_name = 'Tab (fallback)';
  }

  // Parse with detected separator (handle quoted fields for CSV)
  const parseLine = (line) => {
    if(sep === ',' || sep === ';') return parseCSVLine(line, sep);
    return line.split(sep);
  };

  const headers = parseLine(lines[0]).map(h => h.trim().replace(/^["']|["']$/g, ''));
  const data = [];

  for(let i = 1; i < lines.length; i++) {
    const vals = parseLine(lines[i]);
    if(vals.length < 3) continue;
    const obj = {};
    headers.forEach((h, j) => {
      let v = (vals[j] || '').trim().replace(/^["']|["']$/g, '');
      obj[h] = v;
    });
    data.push(obj);
  }

  // Show detection info
  const cfg = POSITIONS[currentTab];
  const matched = cfg.rawCols.filter(c => headers.includes(c));
  const missing = cfg.rawCols.filter(c => !headers.includes(c));

  const infoEl = document.getElementById('detectInfo');
  if(infoEl) {
    let infoHTML = `<div class="detect-info">`;
    infoHTML += `<span><span class="det-label">Formato:</span> <span class="det-value">${sep_name}</span></span>`;
    infoHTML += `<span><span class="det-label">Linhas:</span> <span class="det-value">${data.length}</span></span>`;
    infoHTML += `<span><span class="det-label">Colunas:</span> <span class="det-value">${headers.length}</span></span>`;
    infoHTML += `<span><span class="det-label">Match:</span> <span class="det-value">${matched.length}/${cfg.rawCols.length}</span></span>`;
    if(missing.length > 0 && missing.length <= 5) {
      infoHTML += `<span><span class="det-label">Faltando:</span> <span class="det-warn">${missing.join(', ')}</span></span>`;
    }
    infoHTML += `</div>`;
    infoEl.innerHTML = infoHTML;
  }

  return { headers, data, sep, sep_name };
}

// CSV line parser that handles quoted fields with commas/semicolons inside
function parseCSVLine(line, sep) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for(let i = 0; i < line.length; i++) {
    const ch = line[i];
    if(ch === '"') {
      if(inQuotes && i+1 < line.length && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === sep && !inQuotes) {
      result.push(current); current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

// Handle CSV file drag & drop
function handleFileDrop(e) {
  e.preventDefault();
  e.target.closest('.drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if(!file) return;
  if(!file.name.match(/\.(csv|tsv|txt)$/i)) return showToast('⚠️ Formato não suportado. Use .csv, .tsv ou .txt');
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('pasteArea').value = ev.target.result;
    showToast(`📂 Arquivo "${file.name}" carregado (${(file.size/1024).toFixed(1)} KB)`);
  };
  reader.readAsText(file, 'UTF-8');
}

  allData[currentTab] = [];

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  clearTimeout(toastTimeout);
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  toastTimeout = setTimeout(() => t.remove(), 3000);
}

// ─── HEATMAP ───
const lowerBetter = new Set(['Gols Sofridos','Erros→Gol/90','Falhas/90','Cartões','Min/Gol Sofrido','Min/Gol','Erros→Gol']);
function cellHeat(col, v) {
  const s = colStats[col];
  if(!s || s.max===s.min || typeof v!=='number') return '';
  let t = (v-s.min)/(s.max-s.min);
  if(lowerBetter.has(col)) t = 1-t;
  if(t>0.65) return ' data-heat="good"';
  if(t<0.30) return ' data-heat="bad"';
  return '';
}

// ─── MODAL DE DETALHES ───
function openModal(idx) {
  const row = lastFiltered[idx];
  if(!row) return;
  const cfg = POSITIONS[currentTab];
  const skip = new Set(['Jogador','Nação','Clube']);
  const allCols = [...new Set([...cfg.displayCols, 'Nota FM','Salário','Valor'])].filter(c=>!skip.has(c));
  // Find top stats (top 30% in their column)
  const topStats = new Set();
  for(const col of allCols) {
    const s = colStats[col];
    if(!s||s.max===s.min) continue;
    const v = row[col];
    if(typeof v!=='number') continue;
    let t = (v-s.min)/(s.max-s.min);
    if(lowerBetter.has(col)) t=1-t;
    if(t>=0.70) topStats.add(col);
  }
  let html = `<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-name">${row.Jogador||'?'}</div>
        <div class="modal-sub">${[row.Clube,row.Nação,row.Idade?row.Idade+' anos':''].filter(Boolean).join(' · ')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="score-badge ${scoreClass(row._moneyball)} modal-score">${scoreLabel(row._moneyball)} ${row._moneyball}</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-grid">`;
  for(const col of allCols) {
    const v = row[col];
    if(v===undefined||v===''||v===0&&col==='Nota FM') continue;
    const cls = topStats.has(col)?' top':'';
    html += `<div class="modal-stat${cls}"><div class="modal-stat-label">${col}</div><div class="modal-stat-value">${v}</div></div>`;
  }
  html += `</div></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}
function closeModal() {
  document.querySelector('.modal-overlay')?.remove();
}

function exportCSV() {
  const data = allData[currentTab] || [];
  if(!data.length) return showToast('⚠️ Sem dados para exportar');
  const cfg = POSITIONS[currentTab];
  const cols = ['_moneyball', ...cfg.displayCols];
  const headers = ['#', 'Moneyball', ...cfg.displayCols.map(c => c)].join(';');
  const rows = [...data].sort((a,b)=>b._moneyball-a._moneyball).map((r,i) => {
    const vals = cols.map(c => {
      const v = r[c] ?? '';
      return String(v).includes(';') ? `"${String(v).replace(/"/g,'""')}"` : v;
    });
    return [i+1, ...vals.slice(1)].join(';');
  });
  const csv = '\uFEFF' + [headers, ...rows].join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `moneyball_${cfg.name.toLowerCase().replace(/[^a-z0-9]+/g,'_')}.csv`;
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  showToast(`✅ CSV exportado: ${data.length} jogadores`);
}

function saveToStorage() {
  try { localStorage.setItem('mb_fm26_v2', JSON.stringify(allData)); } catch(e) {}
}

function loadFromStorage() {
  try { const d = localStorage.getItem('mb_fm26_v2'); if(d) allData = JSON.parse(d); } catch(e) {}
}

function loadSampleData() {
  const cfg = POSITIONS[currentTab];
  const samples = getSampleData(currentTab);
  if(!samples) return showToast('⚠️ Sem dados de exemplo para esta posição');
  allData[currentTab] = samples.map(r => {
    try { return cfg.derive(r); } catch(e) { return null; }
  }).filter(r => r && r['Jogos/90'] >= 1);
  saveToStorage();
  showToast(`✅ ${allData[currentTab].length} ${cfg.name} carregados (exemplo)`);
  renderMain();
}

// Init

(function() {
  let saved = 'dark';
  try { saved = localStorage.getItem('mb_theme') || 'dark'; } catch(e) {}
  applyTheme(saved);
})();
render();
setupScrollTopBtn();

// Auto-detect position + auto-process on paste
document.addEventListener('paste', () => {
  setTimeout(() => {
    const ta = document.getElementById('pasteArea');
    if(!ta || ta.value.trim().length < 10) return;
    const raw = ta.value.trim();
    const parsed = smartParse(raw);
    if(!parsed || parsed.data.length === 0) return;

    // Find best matching position by header overlap
    let bestPos = currentTab, bestCount = 0;
    for(const [key, cfg] of Object.entries(POSITIONS)) {
      const cnt = cfg.rawCols.filter(c => parsed.headers.includes(c)).length;
      if(cnt > bestCount) { bestCount = cnt; bestPos = key; }
    }

    if(bestPos !== currentTab) {
      currentTab = bestPos;
      sortCol = '_moneyball'; sortDir = 'desc'; filterText = '';
      renderTabs(); renderMain();
      const newTa = document.getElementById('pasteArea');
      if(newTa) newTa.value = raw;
      showToast(`🎯 Posição detectada: ${POSITIONS[bestPos].name} — processando...`);
    }
    processData();
  }, 200);
});

// Fechar modal com Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
